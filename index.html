<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wellbeing Tracker" />
  <title>Wellbeing Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f0fc; }
    @media print {
      .no-print { display: none !important; }
      #print-report { display: block !important; }
      #app { display: none !important; }
    }
    @media screen { #print-report { display: none; } }
  </style>
</head>
<body>
  <div id="print-report"></div>
  <div id="app"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

const WEEK_DAYS = ["Fri","Sat","Sun","Mon","Tue","Wed","Thu"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const ENERGY_LABELS = {1:"Very Low",2:"Low",3:"Moderate",4:"Good",5:"High"};
const SOCIAL_LABELS = {0:"None",1:"Brief",2:"Some",3:"Good"};
const STORAGE_KEY = "wellbeing-tracker-data";

function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function getTodayStr() { return localDateStr(new Date()); }
function getWeekKey(dateStr) {
  const d = new Date(dateStr+"T00:00:00");
  const sinceFri = (d.getDay()+2)%7;
  d.setDate(d.getDate()-sinceFri);
  return localDateStr(d);
}
function getWeekDates(weekKey) {
  const start = new Date(weekKey+"T00:00:00");
  return WEEK_DAYS.map((_,i) => { const d=new Date(start); d.setDate(start.getDate()+i); return localDateStr(d); });
}
function formatDate(dateStr) {
  const d = new Date(dateStr+"T00:00:00");
  return `${d.getDate()} ${MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
}
function formatShort(dateStr) {
  const d = new Date(dateStr+"T00:00:00");
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function loadData() { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{}; } catch{return {};} }
function saveData(data) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); } catch{} }
const defaultDay = () => ({ energy:3, sleep:"", activity:"", social:1, schoolAttended:null, screenTime:"", notes:"" });

const inputStyle = { width:"100%",padding:"10px 14px",borderRadius:"10px",border:"2px solid #e0d8ea",fontSize:"14px",fontFamily:"Georgia,serif",color:"#2d1f3f",background:"#faf8fc",outline:"none",boxSizing:"border-box" };
const navBtn = { padding:"8px 16px",borderRadius:"20px",border:"2px solid #e0d8ea",background:"#fff",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",color:"#6b5a7e" };

function Field({label,children}) {
  return <div style={{marginBottom:"20px"}}>
    <label style={{display:"block",fontSize:"11px",letterSpacing:"1.5px",color:"#9b8ea8",textTransform:"uppercase",marginBottom:"8px",fontFamily:"Georgia,serif"}}>{label}</label>
    {children}
  </div>;
}
function ChipGroup({options,value,onChange}) {
  return <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
    {options.map(({v,l}) => <button key={String(v)} onClick={()=>onChange(v)} style={{padding:"8px 14px",borderRadius:"20px",border:"2px solid",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",transition:"all 0.15s",borderColor:value===v?"#7c5cbf":"#e0d8ea",background:value===v?"#7c5cbf":"#faf8fc",color:value===v?"#fff":"#4a3860"}}>{l}</button>)}
  </div>;
}
function CustomTooltip({active,payload,label}) {
  if(!active||!payload?.length) return null;
  return <div style={{background:"#2d1f3f",borderRadius:"10px",padding:"10px 14px",fontSize:"12px",color:"#fff"}}>
    <div style={{marginBottom:"4px",fontWeight:"700"}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{color:p.color}}>{p.name}: <strong>{p.value??"—"}</strong></div>)}
  </div>;
}
function ChartCard({title,subtitle,children}) {
  return <div style={{background:"#fff",borderRadius:"16px",padding:"20px",marginBottom:"16px",boxShadow:"0 4px 20px rgba(0,0,0,0.05)",border:"1px solid #ede8f2"}}>
    <div style={{marginBottom:"12px"}}>
      <div style={{fontSize:"14px",fontWeight:"700",color:"#2d1f3f",fontFamily:"Georgia,serif"}}>{title}</div>
      <div style={{fontSize:"11px",color:"#9b8ea8",marginTop:"2px"}}>{subtitle}</div>
    </div>
    {children}
  </div>;
}
function Toast({msg}) {
  return <div style={{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:"#2d1f3f",color:"#fff",padding:"12px 24px",borderRadius:"30px",fontSize:"14px",boxShadow:"0 8px 30px rgba(0,0,0,0.2)",zIndex:200}}>{msg}</div>;
}

function App() {
  const [view,setView] = useState("week");
  const [currentWeek,setCurrentWeek] = useState(()=>getWeekKey(getTodayStr()));
  const [data,setData] = useState(()=>loadData());
  const [editingDay,setEditingDay] = useState(null);
  const [draft,setDraft] = useState(null);
  const [saved,setSaved] = useState(false);

  function openEdit(dateStr) { setDraft({...(data[dateStr]||defaultDay())}); setEditingDay(dateStr); }
  function saveDraft() {
    const nd={...data,[editingDay]:{...draft}};
    setData(nd); saveData(nd);
    setEditingDay(null); setDraft(null);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  const weekDates = getWeekDates(currentWeek);
  const today = getTodayStr();
  function prevWeek() { const d=new Date(currentWeek+"T00:00:00"); d.setDate(d.getDate()-7); setCurrentWeek(localDateStr(d)); }
  function nextWeek() { const d=new Date(currentWeek+"T00:00:00"); d.setDate(d.getDate()+7); setCurrentWeek(localDateStr(d)); }

  const chartData = weekDates.map((dateStr,i)=>{ const d=data[dateStr]; return { day:`${WEEK_DAYS[i]} ${formatShort(dateStr)}`, energy:d?.energy??null, sleep:d?.sleep?parseFloat(d.sleep):null, screen:d?.screenTime?parseFloat(d.screenTime):null, social:d?.social??null, school:d?.schoolAttended===true?1:d?.schoolAttended===false?0:null }; });
  const notesEntries = weekDates.map((dateStr,i)=>({day:WEEK_DAYS[i],date:formatShort(dateStr),notes:data[dateStr]?.notes})).filter(n=>n.notes);

  function getStats() {
    let totalSleep=0,sleepCount=0,totalEnergy=0,energyCount=0,schoolDays=0,schoolPresent=0,activityDays=0,totalScreen=0,screenCount=0;
    weekDates.forEach(dateStr=>{ const d=data[dateStr]; if(!d)return; if(d.energy){totalEnergy+=d.energy;energyCount++;} if(d.sleep){totalSleep+=parseFloat(d.sleep);sleepCount++;} if(d.activity)activityDays++; if(d.screenTime){totalScreen+=parseFloat(d.screenTime);screenCount++;} if(d.schoolAttended!==null){schoolDays++;if(d.schoolAttended)schoolPresent++;} });
    return {totalSleep,sleepCount,totalEnergy,energyCount,schoolDays,schoolPresent,activityDays,totalScreen,screenCount};
  }

  function generateTextReport() {
    const weekEnd=new Date(currentWeek+"T00:00:00"); weekEnd.setDate(weekEnd.getDate()+6);
    const s=getStats(); const lines=[];
    lines.push(`WEEKLY REPORT — ${formatDate(currentWeek)} to ${formatDate(localDateStr(weekEnd))}`);
    lines.push("─".repeat(60)); lines.push("");
    weekDates.forEach((dateStr,i)=>{ const d=data[dateStr]; lines.push(`▸ ${WEEK_DAYS[i]} ${new Date(dateStr+"T00:00:00").getDate()} ${MONTHS_FULL[new Date(dateStr+"T00:00:00").getMonth()]}`); if(!d){lines.push("  No data recorded.");}else{lines.push(`  Energy: ${ENERGY_LABELS[d.energy]} (${d.energy}/5)`);if(d.sleep)lines.push(`  Sleep: ${d.sleep}h`);if(d.activity)lines.push(`  Activity: ${d.activity}`);lines.push(`  Social: ${SOCIAL_LABELS[d.social]}`);if(d.screenTime)lines.push(`  Screen time: ${d.screenTime}h`);if(d.schoolAttended!==null)lines.push(`  School: ${d.schoolAttended?"Attended":"Absent"}`);if(d.notes)lines.push(`  Notes: ${d.notes}`);}lines.push(""); });
    lines.push("─".repeat(60)); lines.push("WEEKLY SUMMARY"); lines.push("─".repeat(60));
    if(s.energyCount)lines.push(`Avg energy: ${(s.totalEnergy/s.energyCount).toFixed(1)}/5`);
    if(s.sleepCount)lines.push(`Avg sleep: ${(s.totalSleep/s.sleepCount).toFixed(1)}h/night`);
    if(s.schoolDays)lines.push(`School: ${s.schoolPresent}/${s.schoolDays} days`);
    lines.push(`Activity days: ${s.activityDays}`);
    if(s.screenCount)lines.push(`Avg screen: ${(s.totalScreen/s.screenCount).toFixed(1)}h/day`);
    return lines.join("\n");
  }

  function copyReport() { navigator.clipboard.writeText(generateTextReport()).then(()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}); }

  function printReport() {
    const s=getStats();
    const weekEnd=new Date(currentWeek+"T00:00:00"); weekEnd.setDate(weekEnd.getDate()+6);
    const we=localDateStr(weekEnd);
    const statBoxes=[
      s.energyCount?`<div class="stat"><div class="sv">${(s.totalEnergy/s.energyCount).toFixed(1)}/5</div><div class="sl">Avg Energy</div></div>`:"",
      s.sleepCount?`<div class="stat"><div class="sv">${(s.totalSleep/s.sleepCount).toFixed(1)}h</div><div class="sl">Avg Sleep</div></div>`:"",
      s.schoolDays?`<div class="stat"><div class="sv">${s.schoolPresent}/${s.schoolDays}</div><div class="sl">School Days</div></div>`:"",
      s.screenCount?`<div class="stat"><div class="sv">${(s.totalScreen/s.screenCount).toFixed(1)}h</div><div class="sl">Avg Screen</div></div>`:"",
      `<div class="stat"><div class="sv">${s.activityDays}</div><div class="sl">Activity Days</div></div>`
    ].join("");
    const rows=weekDates.map((dateStr,i)=>{ const d=data[dateStr]; const lbl=`${WEEK_DAYS[i]} ${new Date(dateStr+"T00:00:00").getDate()} ${MONTHS_FULL[new Date(dateStr+"T00:00:00").getMonth()]}`; if(!d)return `<tr><td><strong>${lbl}</strong></td><td colspan="6" style="color:#999;font-style:italic">No data</td></tr>`; return `<tr><td><strong>${lbl}</strong></td><td>${ENERGY_LABELS[d.energy]} (${d.energy}/5)</td><td>${d.sleep?d.sleep+"h":"—"}</td><td>${d.screenTime?d.screenTime+"h":"—"}</td><td>${SOCIAL_LABELS[d.social]}</td><td>${d.schoolAttended===true?"✓":d.schoolAttended===false?"✗":"—"}</td><td>${d.activity||"—"}</td></tr>`; }).join("");
    const notesHtml=notesEntries.length>0?`<div class="section"><div class="sh">Notes</div>${notesEntries.map(n=>`<div class="note"><div class="nd">${n.day} · ${n.date}</div><div>${n.notes}</div></div>`).join("")}</div>`:"";
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Wellbeing Report</title><style>body{font-family:Georgia,serif;color:#2d1f3f;padding:32px;font-size:13px}.sh{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9b8ea8;margin-bottom:8px;border-bottom:1px solid #ede8f2;padding-bottom:6px}.section{margin-bottom:24px}.stats{display:flex;gap:12px;flex-wrap:wrap}.stat{background:#f5f0fc;border-radius:8px;padding:10px 14px;text-align:center}.sv{font-size:20px;font-weight:700;color:#7c5cbf}.sl{font-size:10px;color:#9b8ea8;text-transform:uppercase}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;font-size:10px;color:#9b8ea8;padding:6px 8px;border-bottom:2px solid #ede8f2}td{padding:7px 8px;border-bottom:1px solid #f5f0fc;vertical-align:top}.note{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f5f0fc}.nd{font-size:11px;font-weight:700;color:#7c5cbf;margin-bottom:3px}</style></head><body><h1 style="font-size:20px;margin-bottom:4px">Wellbeing Report</h1><p style="color:#9b8ea8;font-size:12px;margin-bottom:20px">${formatDate(currentWeek)} — ${formatDate(we)}</p><div class="section"><div class="sh">Weekly Summary</div><div class="stats">${statBoxes}</div></div><div class="section"><div class="sh">Daily Log</div><table><thead><tr><th>Day</th><th>Energy</th><th>Sleep</th><th>Screen</th><th>Social</th><th>School</th><th>Activity</th></tr></thead><tbody>${rows}</tbody></table></div>${notesHtml}</body></html>`;
    const w=window.open("","_blank","width=800,height=600");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>{w.focus();w.print();},600);}
    else { alert("Please allow popups for this site to use Save as PDF, then try again."); }
  }

  function EnergyDot({val}) {
    const colors=["#e0d8ea","#c9b8de","#a07cd4","#7c5cbf","#5a3d99"];
    return <div style={{display:"flex",gap:"3px"}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:i<=val?colors[i-1]:"#f0ebf7"}}/>)}</div>;
  }

  function DayCard({dateStr,dayLabel}) {
    const d=data[dateStr]; const isToday=dateStr===today; const isFuture=dateStr>today;
    return <div onClick={()=>!isFuture&&openEdit(dateStr)} style={{background:isToday?"linear-gradient(145deg,#ede5f8,#f5f0fc)":"#faf8fc",border:isToday?"2px solid #7c5cbf":"2px solid #ede8f2",borderRadius:"16px",padding:"14px",cursor:isFuture?"default":"pointer",opacity:isFuture?0.4:1,minHeight:"110px",display:"flex",flexDirection:"column",gap:"5px",boxShadow:isToday?"0 4px 20px rgba(124,92,191,0.15)":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:"700",fontSize:"13px",color:"#2d1f3f"}}>{dayLabel}</span>
        {isToday&&<span style={{fontSize:"9px",letterSpacing:"2px",color:"#7c5cbf",textTransform:"uppercase"}}>Today</span>}
        {d&&!isFuture&&<span>✓</span>}
      </div>
      <div style={{fontSize:"11px",color:"#9b8ea8"}}>{new Date(dateStr+"T00:00:00").getDate()} {MONTHS[new Date(dateStr+"T00:00:00").getMonth()]}</div>
      {d?<><EnergyDot val={d.energy}/>{d.sleep&&<div style={{fontSize:"11px",color:"#6b5a7e"}}>😴 {d.sleep}h</div>}{d.schoolAttended===true&&<div style={{fontSize:"11px",color:"#5a8a5a"}}>🏫 ✓</div>}{d.schoolAttended===false&&<div style={{fontSize:"11px",color:"#a05a5a"}}>🏫 Absent</div>}{d.screenTime&&<div style={{fontSize:"11px",color:"#6b5a7e"}}>📱 {d.screenTime}h</div>}</>:!isFuture&&<div style={{fontSize:"11px",color:"#c4b8d4",marginTop:"auto",fontStyle:"italic"}}>Tap to add</div>}
    </div>;
  }

  const weekNav = <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
    <button onClick={prevWeek} style={navBtn}>← Prev</button>
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:"14px",fontWeight:"700",color:"#2d1f3f"}}>{formatDate(currentWeek)}</div>
      <div style={{fontSize:"11px",color:"#9b8ea8"}}>to {formatDate(weekDates[6])}</div>
    </div>
    <button onClick={nextWeek} style={navBtn}>Next →</button>
  </div>;

  const modal = editingDay&&draft ? <div style={{position:"fixed",inset:0,background:"rgba(30,20,40,0.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
    <div style={{background:"#fff",borderRadius:"20px",padding:"28px",maxWidth:"480px",width:"100%",boxShadow:"0 24px 80px rgba(0,0,0,0.18)",maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
        <div>
          <div style={{fontSize:"10px",letterSpacing:"2px",color:"#9b8ea8",textTransform:"uppercase",marginBottom:"3px"}}>Recording entry for</div>
          <div style={{fontSize:"19px",fontWeight:"700",color:"#2d1f3f"}}>{WEEK_DAYS[weekDates.indexOf(editingDay)]} · {formatDate(editingDay)}</div>
        </div>
        <button onClick={()=>setEditingDay(null)} style={{border:"none",background:"#f3eef8",borderRadius:"50%",width:"34px",height:"34px",cursor:"pointer",fontSize:"18px",color:"#6b5a7e"}}>×</button>
      </div>
      <Field label="Energy Level"><ChipGroup options={[1,2,3,4,5].map(v=>({v,l:`${v} · ${ENERGY_LABELS[v]}`}))} value={draft.energy} onChange={v=>setDraft({...draft,energy:v})}/></Field>
      <Field label="Sleep (hours)"><input type="number" min="0" max="24" step="0.5" value={draft.sleep} onChange={e=>setDraft({...draft,sleep:e.target.value})} placeholder="e.g. 7.5" style={inputStyle}/></Field>
      <Field label="Physical Activity"><input type="text" value={draft.activity} onChange={e=>setDraft({...draft,activity:e.target.value})} placeholder="e.g. 20 min walk..." style={inputStyle}/></Field>
      <Field label="Screen Time (hours)"><input type="number" min="0" max="24" step="0.5" value={draft.screenTime} onChange={e=>setDraft({...draft,screenTime:e.target.value})} placeholder="e.g. 4" style={inputStyle}/></Field>
      <Field label="Social Interaction"><ChipGroup options={Object.entries(SOCIAL_LABELS).map(([v,l])=>({v:Number(v),l}))} value={draft.social} onChange={v=>setDraft({...draft,social:v})}/></Field>
      <Field label="School Attendance"><ChipGroup options={[{v:true,l:"✓ Attended"},{v:false,l:"✗ Absent"},{v:null,l:"Weekend / N/A"}]} value={draft.schoolAttended} onChange={v=>setDraft({...draft,schoolAttended:v})}/></Field>
      <Field label="Notes for Psychologist"><textarea value={draft.notes} onChange={e=>setDraft({...draft,notes:e.target.value})} placeholder="Notable events, mood shifts..." rows={3} style={{...inputStyle,resize:"vertical",lineHeight:"1.6"}}/></Field>
      <button onClick={saveDraft} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#7c5cbf,#a07cd4)",color:"#fff",border:"none",borderRadius:"12px",fontSize:"15px",fontFamily:"Georgia,serif",fontWeight:"600",cursor:"pointer"}}>Save Entry</button>
    </div>
  </div> : null;

  return <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5f0fc 0%,#ede8f8 40%,#e8e0f5 100%)"}}>
    {modal}
    <div className="no-print" style={{background:"linear-gradient(135deg,#2d1f3f,#4a3060)",padding:"28px 24px 24px",color:"#fff"}}>
      <div style={{maxWidth:"600px",margin:"0 auto"}}>
        <div style={{fontSize:"10px",letterSpacing:"3px",color:"#c4b0e0",textTransform:"uppercase",marginBottom:"6px"}}>Wellbeing Tracker</div>
        <h1 style={{margin:"0 0 4px",fontSize:"26px",fontWeight:"700"}}>Weekly Log</h1>
        <p style={{margin:0,fontSize:"13px",color:"#b8a0d4"}}>Daily observations for your son's psychologist</p>
        <div style={{display:"flex",gap:"8px",marginTop:"20px"}}>
          {[["week","Week View"],["report","Weekly Report"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} style={{padding:"8px 20px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",fontWeight:"600",background:view===v?"rgba(255,255,255,0.2)":"transparent",color:view===v?"#fff":"#c4b0e0"}}>{l}</button>)}
        </div>
      </div>
    </div>

    <div style={{maxWidth:"600px",margin:"0 auto",padding:"24px 16px"}}>
      {view==="week"&&<>
        {weekNav}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          {weekDates.map((dateStr,i)=><DayCard key={dateStr} dateStr={dateStr} dayLabel={WEEK_DAYS[i]}/>)}
        </div>
        {saved&&<Toast msg="Entry saved ✓"/>}
      </>}

      {view==="report"&&<>
        {weekNav}
        <ChartCard title="Energy Level" subtitle="Daily score (1–5)">
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={chartData} margin={{top:8,right:8,left:-20,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0ebf7"/>
              <XAxis dataKey="day" tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <YAxis domain={[0,5]} ticks={[1,2,3,4,5]} tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Line type="monotone" dataKey="energy" name="Energy" stroke="#7c5cbf" strokeWidth={2.5} dot={{r:4,fill:"#7c5cbf",strokeWidth:0}} connectNulls activeDot={{r:6}}/>
            </LineChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="Sleep" subtitle="Hours per night">
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={chartData} margin={{top:8,right:8,left:-20,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0ebf7"/>
              <XAxis dataKey="day" tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <YAxis domain={[0,12]} tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Bar dataKey="sleep" name="Sleep (hrs)" fill="#a07cd4" radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="Screen Time" subtitle="Hours per day">
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={chartData} margin={{top:8,right:8,left:-20,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0ebf7"/>
              <XAxis dataKey="day" tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <YAxis domain={[0,16]} tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Bar dataKey="screen" name="Screen (hrs)" fill="#c9a0e0" radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="Social & School" subtitle="Social: 0–3 · School: 0=Absent 1=Present">
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={chartData} margin={{top:8,right:8,left:-20,bottom:0}} barCategoryGap="25%">
              <CartesianGrid strokeDasharray="3 3" stroke="#f0ebf7"/>
              <XAxis dataKey="day" tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <YAxis domain={[0,3]} ticks={[0,1,2,3]} tick={{fontSize:10,fill:"#9b8ea8"}} tickLine={false} axisLine={false}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Legend wrapperStyle={{fontSize:"11px",color:"#9b8ea8",paddingTop:"4px"}}/>
              <Bar dataKey="social" name="Social" fill="#c9a0e0" radius={[4,4,0,0]}/>
              <Bar dataKey="school" name="School" fill="#5a3d99" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        {notesEntries.length>0&&<div style={{background:"#fff",borderRadius:"16px",padding:"20px",marginTop:"16px",boxShadow:"0 4px 20px rgba(0,0,0,0.05)",border:"1px solid #ede8f2"}}>
          <div style={{fontSize:"11px",letterSpacing:"2px",color:"#9b8ea8",textTransform:"uppercase",marginBottom:"14px"}}>Notes</div>
          {notesEntries.map((n,i)=><div key={i} style={{marginBottom:"14px",paddingBottom:"14px",borderBottom:i<notesEntries.length-1?"1px solid #f0ebf7":"none"}}>
            <div style={{fontSize:"12px",fontWeight:"700",color:"#7c5cbf",marginBottom:"4px"}}>{n.day} · {n.date}</div>
            <div style={{fontSize:"13px",color:"#3a2a50",lineHeight:"1.6"}}>{n.notes}</div>
          </div>)}
        </div>}

        <div style={{display:"flex",gap:"10px",marginTop:"16px"}}>
          <button onClick={copyReport} style={{flex:1,padding:"13px",background:"#f3eef8",color:"#7c5cbf",border:"2px solid #e0d8ea",borderRadius:"12px",fontSize:"14px",fontFamily:"Georgia,serif",fontWeight:"600",cursor:"pointer"}}>Copy Text</button>
          <button onClick={printReport} style={{flex:1,padding:"13px",background:"linear-gradient(135deg,#7c5cbf,#a07cd4)",color:"#fff",border:"none",borderRadius:"12px",fontSize:"14px",fontFamily:"Georgia,serif",fontWeight:"600",cursor:"pointer"}}>Save as PDF</button>
        </div>
        {saved&&<Toast msg="Copied ✓"/>}
      </>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
